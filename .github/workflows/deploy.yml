name: Deploy to EC2

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Zip source
        run: zip -r deploy.zip . -x "*.git*" -x ".env"

      - name: Upload to S3
        run: aws s3 cp deploy.zip s3://workit-documents/deploy/deploy.zip

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws s3 cp s3://workit-documents/deploy/deploy.zip /home/ec2-user/deploy.zip",
              "cd /home/ec2-user && unzip -o deploy.zip -d Workit",
              "cd /home/ec2-user/Workit && /home/ec2-user/Workit/venv/bin/pip install -r requirements.txt",
              "cd /home/ec2-user/Workit && /home/ec2-user/Workit/venv/bin/python manage.py migrate --noinput",
              "cd /home/ec2-user/Workit && /home/ec2-user/Workit/venv/bin/python manage.py collectstatic --noinput",
              "sudo systemctl restart gunicorn celery"
            ]'
