{% extends 'base.html' %}
{% block title %}문서 보기 · Workit{% endblock %}

{% block content %}
<div class="doc-viewer" style="height:100vh; display:flex; flex-direction:column;">

  <div class="doc-viewer-header">
    <a href="{% url 'contract_list' %}" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
      목록
    </a>
    <div class="doc-viewer-title">
      <span class="doc-filename">{{ doc.filename }}</span>
      <span class="doc-breadcrumb">{{ contract.project_name }} · {{ contract.company_name }}</span>
    </div>
  </div>

  <div style="flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:16px; background:#F8F9FA;">
    {% if doc.file %}
    <div id="pdfPages"></div>
    {% else %}
    <div class="doc-empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="56" height="56">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <p>파일 미리보기를 지원하지 않는 형식입니다.</p>
    </div>
    {% endif %}
  </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
  const container = document.getElementById('pdfPages');
  if (!container) return;

  const DOC_ID = {{ doc.id }};

  fetch(`/contracts/document/${DOC_ID}/pages/`)
    .then(r => r.json())
    .then(data => {
      const total = data.pages || 1;
      for (let p = 1; p <= total; p++) {
        const wrap = document.createElement('div');
        wrap.style.cssText = 'background:#fff; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden; max-width:860px; margin:0 auto; width:100%;';

        const pageNum = document.createElement('div');
        pageNum.textContent = `- ${p} -`;
        pageNum.style.cssText = 'text-align:center; font-size:12px; color:#aaa; padding:8px 0;';

        const img = document.createElement('img');
        img.src = `/contracts/document/${DOC_ID}/page/${p}/`;
        img.style.cssText = 'width:100%; display:block;';
        img.alt = `페이지 ${p}`;

        wrap.appendChild(pageNum);
        wrap.appendChild(img);
        container.appendChild(wrap);
      }
    });
})();
</script>
{% endblock %}
